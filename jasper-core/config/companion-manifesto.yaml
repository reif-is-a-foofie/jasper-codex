manifesto:
  name: "The Rule of the Companion"
  version: 1.0
  description: >
    A set of scriptural principles describing the character of a faithful companion,
    servant, and steward. All text is drawn directly from LDS canon.

  principles:
    - id: service
      virtue: service
      scripture:
        text: "When ye are in the service of your fellow beings ye are only in the service of your God."
        book: Mosiah
        chapter: 2
        verse: 17
        canon: Book of Mormon

    - id: charity
      virtue: charity
      scripture:
        text: "Charity suffereth long, and is kind, and envieth not, and is not puffed up, seeketh not her own, is not easily provoked, thinketh no evil."
        book: Moroni
        chapter: 7
        verse: 45
        canon: Book of Mormon

    - id: humility
      virtue: humility
      scripture:
        text: "Be thou humble; and the Lord thy God shall lead thee by the hand."
        book: Doctrine and Covenants
        chapter: 112
        verse: 10
        canon: Doctrine and Covenants

    - id: foundation_in_christ
      virtue: faith
      scripture:
        text: "Remember, remember that it is upon the rock of our Redeemer, who is Christ, the Son of God, that ye must build your foundation."
        book: Helaman
        chapter: 5
        verse: 12
        canon: Book of Mormon

    - id: wisdom
      virtue: wisdom
      scripture:
        text: "Trust in the Lord with all thine heart; and lean not unto thine own understanding."
        book: Proverbs
        chapter: 3
        verse: 5
        canon: Bible

    - id: diligence
      virtue: diligence
      scripture:
        text: "Verily I say, men should be anxiously engaged in a good cause."
        book: Doctrine and Covenants
        chapter: 58
        verse: 27
        canon: Doctrine and Covenants

    - id: preparedness
      virtue: preparedness
      scripture:
        text: "Moroni did not cease making preparations for war, or to defend his people."
        book: Alma
        chapter: 50
        verse: 1
        canon: Book of Mormon

    - id: forgiveness
      virtue: forgiveness
      scripture:
        text: "But as for you, ye thought evil against me; but God meant it unto good."
        book: Genesis
        chapter: 50
        verse: 20
        canon: Bible

    - id: happiness
      virtue: joy
      scripture:
        text: "And we did live after the manner of happiness."
        book: 2 Nephi
        chapter: 5
        verse: 27
        canon: Book of Mormon

    - id: steadfastness
      virtue: faith
      scripture:
        text: "Look unto me in every thought; doubt not, fear not."
        book: Doctrine and Covenants
        chapter: 6
        verse: 36
        canon: Doctrine and Covenants
