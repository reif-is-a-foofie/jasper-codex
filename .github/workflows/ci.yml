name: ci

on:
  pull_request: {}
  push: { branches: [main] }

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Python helper scripts
        run: |
          python3 -m py_compile \
            ./scripts/stage_npm_packages.py \
            ./codex-cli/scripts/build_npm_package.py \
            ./codex-cli/scripts/install_native_deps.py \
            ./jasper-overlay/scripts/build_package.py

      - name: Validate Jasper JavaScript entrypoints
        run: |
          node --check ./jasper-core/src/identity.js
          node --check ./jasper-memory/src/embeddings.js
          node --check ./jasper-memory/src/event-store.js
          node --check ./jasper-agent/src/runtime.js
          node --check ./jasper-agent/src/cli.js
          node --check ./jasper-overlay/bin/jasper.js

      - name: Smoke test Jasper memory runtime
        run: |
          TMP_MEMORY_ROOT="$(mktemp -d)"
          TMP_WATCH_ROOT="$(mktemp -d)"
          TMP_TOOLS_ROOT="$(mktemp -d)"
          TMP_PACKAGE_STAGE="$(mktemp -d)"
          TMP_VENDOR_SRC="$(mktemp -d)"
          TMP_VENDOR_PACKAGE_STAGE="$(mktemp -d)"
          TMP_PACKAGE_PACK_DIR="$(mktemp -d)"
          TMP_PACKAGE_TGZ="$TMP_PACKAGE_PACK_DIR/jasper-ai-0.1.0.tgz"
          mkdir -p "$TMP_TOOLS_ROOT/generated/tools"
          mkdir -p "$TMP_VENDOR_SRC/x86_64-unknown-linux-musl/codex"
          mkdir -p "$TMP_VENDOR_SRC/x86_64-unknown-linux-musl/path"
          printf '#!/bin/sh\nexit 0\n' > "$TMP_VENDOR_SRC/x86_64-unknown-linux-musl/codex/codex"
          chmod +x "$TMP_VENDOR_SRC/x86_64-unknown-linux-musl/codex/codex"
          printf '[]\n' > "$TMP_TOOLS_ROOT/generated/registry.json"
          node ./jasper-agent/src/cli.js start --max-ticks 2 --interval-ms 10 --memory-root "$TMP_MEMORY_ROOT"
          node ./jasper-agent/src/cli.js memory recent --memory-root "$TMP_MEMORY_ROOT" --limit 5
          node ./jasper-agent/src/cli.js memory search runtime --memory-root "$TMP_MEMORY_ROOT" --limit 5
          node ./jasper-agent/src/cli.js memory semantic "household operations" --memory-root "$TMP_MEMORY_ROOT" --limit 5
          node ./jasper-agent/src/cli.js dream reflect --memory-root "$TMP_MEMORY_ROOT" --limit 10
          node ./jasper-agent/src/cli.js dream recent --memory-root "$TMP_MEMORY_ROOT" --limit 5
          (sleep 0.12; printf 'hello\n' > "$TMP_WATCH_ROOT"/note.txt) &
          node ./jasper-agent/src/cli.js start --max-ticks 4 --interval-ms 80 --memory-root "$TMP_MEMORY_ROOT" --watch-path "$TMP_WATCH_ROOT" >/dev/null
          node ./jasper-agent/src/cli.js memory search listener.filesystem.changed --memory-root "$TMP_MEMORY_ROOT" --limit 5
          node ./jasper-agent/src/cli.js tools list
          node ./jasper-agent/src/cli.js tools templates
          node ./jasper-agent/src/cli.js tools generate --tools-root "$TMP_TOOLS_ROOT" --id ops-focus --template semantic-memory-search --description "Operational focus search" --query "household operations"
          node ./jasper-agent/src/cli.js tools list --tools-root "$TMP_TOOLS_ROOT"
          node ./jasper-agent/src/cli.js tools run identity-summary
          node ./jasper-agent/src/cli.js tools run ops-focus --tools-root "$TMP_TOOLS_ROOT" --memory-root "$TMP_MEMORY_ROOT"
          node ./jasper-agent/src/cli.js tools run semantic-memory-search --memory-root "$TMP_MEMORY_ROOT" --query "household operations"
          node ./jasper-overlay/bin/jasper.js memory recent --memory-root "$TMP_MEMORY_ROOT" --limit 3
          node ./jasper-overlay/bin/jasper.js dream reflect --memory-root "$TMP_MEMORY_ROOT" --limit 10
          node ./jasper-overlay/bin/jasper.js tools list
          python3 ./jasper-overlay/scripts/build_package.py --version 0.1.0 --staging-dir "$TMP_PACKAGE_STAGE" --pack-output "$TMP_PACKAGE_TGZ"
          python3 ./jasper-overlay/scripts/build_package.py --version 0.1.0 --staging-dir "$TMP_VENDOR_PACKAGE_STAGE" --vendor-src "$TMP_VENDOR_SRC"
          node "$TMP_PACKAGE_STAGE/bin/jasper.js" identity
          node "$TMP_PACKAGE_STAGE/bin/jasper.js" tools list
          test -f "$TMP_PACKAGE_TGZ"
          test -f "$TMP_VENDOR_PACKAGE_STAGE/vendor/x86_64-unknown-linux-musl/codex/codex"

      - name: Prettier (run `pnpm run format:fix` to fix)
        run: pnpm run format
