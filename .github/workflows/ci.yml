name: ci

on:
  pull_request: {}
  push: { branches: [main] }

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Python helper scripts
        run: |
          python3 -m py_compile \
            ./scripts/stage_npm_packages.py \
            ./codex-cli/scripts/build_npm_package.py \
            ./codex-cli/scripts/install_native_deps.py

      - name: Validate Jasper JavaScript entrypoints
        run: |
          node --check ./jasper-core/src/identity.js
          node --check ./jasper-memory/src/embeddings.js
          node --check ./jasper-memory/src/event-store.js
          node --check ./jasper-agent/src/runtime.js
          node --check ./jasper-agent/src/cli.js
          node --check ./jasper-overlay/bin/jasper.js

      - name: Smoke test Jasper memory runtime
        run: |
          TMP_MEMORY_ROOT="$(mktemp -d)"
          node ./jasper-agent/src/cli.js start --max-ticks 2 --interval-ms 10 --memory-root "$TMP_MEMORY_ROOT"
          node ./jasper-agent/src/cli.js memory recent --memory-root "$TMP_MEMORY_ROOT" --limit 5
          node ./jasper-agent/src/cli.js memory search runtime --memory-root "$TMP_MEMORY_ROOT" --limit 5
          node ./jasper-agent/src/cli.js memory semantic "household operations" --memory-root "$TMP_MEMORY_ROOT" --limit 5
          node ./jasper-overlay/bin/jasper.js memory recent --memory-root "$TMP_MEMORY_ROOT" --limit 3

      - name: Prettier (run `pnpm run format:fix` to fix)
        run: pnpm run format
